<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ratos Temporary Password</title>
</head>
<body style="background-color: lightyellow;">
<div style="margin: 0 auto; width: 100%; text-align: center">
    <div style="margin: 0 auto; width: 100%; padding: 20px 0; text-align: center; border-bottom: 1px solid #DFE2EA">
        <img id="logo" src="https://drive.google.com/uc?id=15LWpV06MM5_AmL-zBiwevVoc8OkET9lm" style="width: 296px;"
             alt="RATOS">
    </div>
    <div style="margin: 0 auto; width: 100%; padding: 20px 0; text-align: center; border-bottom: 1px solid #DFE2EA">
        <div style="margin: 0 auto; width: 543px; color: #000000; font-family: Silka, Helvetica, sans-serif; font-size: 20px; font-weight:600; line-height: 32px; text-align: center;">
            Hi, {{name}}!
        </div>
        <div style="margin: 0 auto; width: 543px; color: #000000; font-family: Silka, Helvetica, sans-serif; font-size: 20px; font-weight:300; line-height: 32px; text-align: center;">
            You have just requested a password reset. We've generated a new password for you.
        </div>
        <div style="margin: 0 auto; width: 543px; color: #000000; font-family: Silka, Helvetica, sans-serif; font-size: 20px; font-weight:600; line-height: 32px; text-align: center;">
            Your temporary password is:
            <div style="color: #61DAFB"> {{new_password}}</div>
        </div>
        <div style="margin: 0 auto; width: 543px; color: #000000; font-family: Silka, Helvetica, sans-serif; font-size: 20px; font-weight:300; line-height: 32px; text-align: center;">
            After sign-in, do not forget to change your temporary password to your own.
        </div>
        <div style="margin: 20px auto; width: 543px; color: #000000; font-family: Silka, Helvetica, sans-serif; font-size: 14px; font-weight:600; line-height: 32px; text-align: center;">
            Sincerely, the ratos3 team.
        </div>
    </div>

</div>

</body>
</html>
