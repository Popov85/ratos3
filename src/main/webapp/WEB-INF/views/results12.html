<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title>#{results24.title}</title>
    <link rel="stylesheet" type="text/css" href="/css/lib/bootstrap.css"/>
    <link rel="stylesheet" type="text/css" href="/css/general.css"/>
    <link rel="stylesheet" type="text/css" href="/css/results12.css"/>
</head>
<body>
<div class="container-fluid">
    <div class="row top text-center">
        <div class="col-12">
            <div th:replace="/fragment/img_header :: img"/>
        </div>
    </div>
    <div class="row text-center">
        <div class="col-12">
            <label th:text="#{results24.heading}"/>
        </div>
    </div>

    <div class="row text-center">
        <div class="col-12">
            <table border="1" cellpadding="0" cellspacing="0">
                <tbody>
                <tr>
                <th th:text="#{start.scheme}"></th>
                <th th:text="#{student.name}"></th>
                <th th:text="#{student.surname}"></th>
                <th th:text="#{student.year}"></th>
                <th th:text="#{student.class}"></th>
                <th th:text="#{student.faculty}"></th>
                <th th:text="#{result.percentage}"></th>
                <th th:text="#{result.mark}"></th>
                </tr>
                <tr>
                    <td>Java Core Level 1</td>
                    <td>Andrey</td>
                    <td>Popov</td>
                    <td>6</td>
                    <td>11</td>
                    <td>mfi</td>
                    <td>98</td>
                    <td>5</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
